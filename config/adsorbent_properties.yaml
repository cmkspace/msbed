# Adsorbent Isotherm & Kinetic Parameters
#
# Literature-based parameters. Values marked TODO must be verified
# from referenced papers before final simulation runs.

# ============================================================
# Activated Alumina (H₂O adsorption)
# Toth Isotherm: q = q_m·b·P / [1+(b·P)^t]^(1/t)
# ============================================================
alumina_h2o_toth:
  reference: "Serbezov & Sotirchos (1998), Desai et al. (1992)"
  notes: |
    Provisional values calibrated against the Phase 1 DBD design point
    (P_h2o=1697 Pa, T=298.15 K, expected loading 6 wt%) per DD-009.
    Pending direct fitting from Serbezov (1998) PDF in Phase 2 Week 2.

  # Saturation capacity
  q_m0_mol_kg: 13.0              # provisional, within typical AA range 7-22
  chi_qm: 0.0                    # T-dependence of q_m (set to 0 for now)
  T_ref_K: 298.15

  # Affinity parameter — calibrated value (was 1.0e-9 placeholder, see DD-009)
  b0_Pa_inv: 1.0e-3              # CALIBRATED: yields 6.43 wt% at design point
  delta_H_J_mol: 54000           # heat of adsorption magnitude (J/mol, +ve)

  # Heterogeneity parameter
  t_heterogeneity: 0.45          # provisional (typical AA range 0.3~0.6)

  # Validity range
  T_range_K: [273, 423]
  P_h2o_range_Pa: [10, 5000]

  # Sign convention for Van't Hoff temperature dependence:
  #   b(T) = b0 · exp[ΔH / (R · T_ref) · (T_ref/T − 1)]
  # ΔH stored as positive magnitude → b increases as T decreases (exothermic).
  vant_hoff_form: "b(T) = b0 * exp(dH/(R*T_ref) * (T_ref/T - 1))"

  # Calibration metadata (DD-009)
  provisional_calibration:
    calibrated_against: "Phase 1 DBD: 6 wt% dynamic loading at design point"
    calibration_date: "2026-05-07"
    design_point:
      P_h2o_Pa: 1697
      T_K: 298.15
    expected_q_wt_pct: 6.0
    tolerance_pct: 50
    last_validated_b0: 1.0e-3
    status: "PROVISIONAL — pending literature fitting (Serbezov 1998)"
    enforced_by: "phase2_simulation.isotherms.sanity_check_at_design_point()"

# ============================================================
# Zeolite 13X (CO₂ adsorption)
# Langmuir Isotherm: q = q_m·b·P / (1 + b·P)
# ============================================================
zeolite_13x_co2_langmuir:
  reference: "Cavenati, Grande, Rodrigues (2004)"
  citation: "J. Chem. Eng. Data 49, 1095-1101 (2004)"

  # Saturation capacity
  q_m_mol_kg: 5.5

  # Affinity parameter — calibrated value (was 2.4e-7 placeholder, see DD-009)
  b0_Pa_inv: 4.0e-9              # CALIBRATED: yields 2.47 mol/kg at 298 K, 100 Pa (Cavenati 2004 ±20%)
  delta_H_J_mol: 36000           # heat of adsorption magnitude (J/mol, +ve)

  # Validity range
  T_range_K: [298, 348]
  P_co2_range_Pa: [100, 500000]

  # Sign convention for Van't Hoff temperature dependence:
  #   b(T) = b0 · exp(+ΔH / (R · T))
  # ΔH stored as positive magnitude → b increases as T decreases (exothermic).
  # NOTE: PHASE2_SPEC §2.2.2 was corrected from `exp(-dH/RT)` to this form (DD-009).
  vant_hoff_form: "b(T) = b0 * exp(+dH/(R*T))"

  # Calibration metadata (DD-009)
  provisional_calibration:
    calibrated_against: "Cavenati 2004 reference point: q=2.5 mol/kg at 298 K, 100 Pa CO2"
    calibration_date: "2026-05-07"
    reference_point:
      P_co2_Pa: 100
      T_K: 298.15
    expected_q_mol_kg: 2.5
    tolerance_pct: 20
    last_validated_b0: 4.0e-9
    status: "PROVISIONAL — pending direct fit from Cavenati 2004 PDF"
    enforced_by: "phase2_simulation.isotherms.sanity_check_at_design_point()"

# ============================================================
# Mass Transfer Coefficients (LDF via Glueckauf)
# k_LDF = 15·D_eff / r_p²
# D_eff = ε_p · D_m / τ
# ============================================================
mass_transfer:
  alumina:
    particle_radius_m: 0.0015     # 3 mm bead → r=1.5 mm
    particle_porosity: 0.40
    tortuosity: 3.0

    # Dual-resistance internal term (DD-010).
    # AA lacks well-defined micropores; this is an EMPIRICAL surrogate for
    # the lumped non-macropore resistance (surface diffusion + binding kinetics)
    # fit to literature k_LDF measurements.
    k_internal_s_inv: 0.5
    k_internal_provenance: "EMPIRICAL — surrogate fit to Serbezov 1998 / Bonnissel et al. literature k_LDF"
    k_internal_validity: "Provisional, replace with measured k_LDF in Phase 6"
    notes: |
      Mass transfer dominated by macropore + surface diffusion + binding
      kinetics (no clean micropore). Dual-resistance combination:
        1/k_LDF = 1/k_macro + 1/k_internal
      with k_macro = 15·D_eff/r_p² and k_internal = 0.5 s⁻¹ (empirical).
      See DD-010.

    calibrated_k_ldf:
      design_point:
        T_K: 288.15
        P_Pa: 6.0928e5
        u_superficial_m_s: 0.201
      computed_k_macro_s_inv: 3.49
      computed_k_internal_s_inv: 0.5
      computed_k_LDF_s_inv: 0.437
      allowed_range_s_inv: [0.001, 1.0]
      mtz_width_m: 0.460
      cells_in_mtz_at_n50_per_layer: 24.4
      status: "PROVISIONAL — AA k_internal pending Phase 6 measured k_LDF"
      enforced_by: "phase2_simulation.ldf_kinetics.sanity_check_at_design_point()"

  zeolite_13x:
    particle_radius_m: 0.0008     # 1.6 mm bead → r=0.8 mm
    particle_porosity: 0.35
    tortuosity: 3.0

    # Dual-resistance internal term (DD-010).
    # 13X k_micro is mechanistic via Glueckauf using Yang 1987 typical
    # intracrystalline diffusion: k_micro = 15·(D_c/r_c²) with D_c/r_c² ≈ 0.01 s⁻¹.
    D_c_over_rc2_s_inv: 0.01
    D_c_provenance: "Yang (1987) typical value for CO₂ micropore diffusion in 13X"
    k_internal_s_inv: 0.15        # = 15 · D_c_over_rc2
    k_internal_provenance: "MECHANISTIC — Glueckauf micropore: k_micro = 15·(D_c/r_c²)"
    notes: |
      Combined macropore + micropore (Ruthven 1984 dual-resistance):
        1/k_LDF = 1/k_macro + 1/k_internal
      k_internal is the Glueckauf micropore rate from Yang 1987 typical
      D_c/r_c² for CO₂ in 13X crystallites. See DD-010.

    calibrated_k_ldf:
      design_point:
        T_K: 288.15
        P_Pa: 6.0928e5
        u_superficial_m_s: 0.201
      computed_k_macro_s_inv: 6.75
      computed_k_internal_s_inv: 0.15
      computed_k_LDF_s_inv: 0.147
      allowed_range_s_inv: [0.005, 5.0]
      mtz_width_m: 1.370
      cells_in_mtz_at_n50_per_layer: 86.5
      status: "PROVISIONAL — D_c/r_c² is Yang 1987 typical; refine if 13X grade differs"
      enforced_by: "phase2_simulation.ldf_kinetics.sanity_check_at_design_point()"

# ============================================================
# Axial Dispersion (Wakao-Funazkri correlation)
# D_ax/D_m = 20 + 0.5·Sc·Re
# ============================================================
axial_dispersion:
  correlation: "Wakao-Funazkri (1978)"
  reference: "Chem. Eng. Sci. 33, 1375 (1978)"
  formula: "D_ax / D_m = 20 + 0.5 * Sc * Re"

# ============================================================
# Heat Transfer
# ============================================================
heat_transfer:
  axial_thermal_conductivity_W_m_K: 0.5    # effective bed value
  wall_heat_transfer_U_W_m2_K: 5.0         # to ambient (insulated assumption)
  ambient_temperature_K: 298.15

# ============================================================
# Molecular Diffusivities (will be calculated by Fuller eq.)
# Reference values at 298 K, 1 atm for sanity check
# ============================================================
molecular_diffusivity_reference:
  h2o_in_air_298K_1atm_m2_s: 2.6e-5
  co2_in_air_298K_1atm_m2_s: 1.6e-5
  notes: "Use Fuller equation for actual T, P scaling"

